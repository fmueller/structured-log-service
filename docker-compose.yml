services:
  app:
    build: .
    container_name: log-ingestion-service
    ports:
      - '3003:3003'
    environment:
      PORT: '3003'
      API_KEYS: 'dev-api-key,another-test-key'
      LOG_MAX_BATCH_SIZE: '1000'
      LOG_QUEUE_MAX_SIZE: '1000'
      LOG_WORKER_CONCURRENCY: '5'
      LOG_WORKER_MAX_RETRIES: '3'
      # Chaos provides all artificial latency; suppress the default StdoutLogProcessor floor.
      LOG_PROCESSING_DELAY_MS: '0'
      # Bumped from the 5000 ms default to accommodate ~5 s chaos outliers during drain.
      LOG_WORKER_DRAIN_TIMEOUT_MS: '10000'
      LOG_CHAOS_ENABLED: 'true'
      OTEL_SERVICE_NAME: 'log-ingestion-service'
      OTEL_EXPORTER_OTLP_ENDPOINT: 'http://otelcol:4318'
      OTEL_EXPORTER_OTLP_PROTOCOL: 'http/protobuf'
      OTEL_RESOURCE_ATTRIBUTES: 'deployment.environment.name=development'
    depends_on:
      otelcol:
        condition: service_started

  otelcol:
    image: otel/opentelemetry-collector-contrib:0.152.0
    container_name: otelcol
    command: ['--config=/etc/otelcol-contrib/config.yaml']
    volumes:
      - ./otelcol.yaml:/etc/otelcol-contrib/config.yaml:ro
    environment:
      DASH0_OTLP_ENDPOINT: '${DASH0_OTLP_ENDPOINT}'
      DASH0_AUTH_TOKEN: '${DASH0_AUTH_TOKEN}'
    ports:
      - '4317:4317'
      - '4318:4318'

  log-producer:
    build:
      context: ./scripts
      dockerfile: Dockerfile
    container_name: log-producer
    environment:
      INGESTION_URL: 'http://app:3003/logs/json'
      API_KEY: 'dev-api-key'
      BATCH_SIZE: '10'
      INTERVAL_MS: '500'
      OTEL_EXPORTER_OTLP_ENDPOINT: 'http://otelcol:4318'
      OTEL_RESOURCE_ATTRIBUTES: 'deployment.environment.name=development'
      # Forwarded from host shell by mise tasks compose:smoke:once / compose:smoke:scenario.
      BATCH_LIMIT: '${BATCH_LIMIT:-}'
      SCENARIO: '${SCENARIO:-}'
    depends_on:
      app:
        condition: service_started
      otelcol:
        condition: service_started
    profiles:
      - loadtest
