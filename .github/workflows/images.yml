name: Container Images

on:
  pull_request:
    paths:
      - '.dockerignore'
      - '.github/workflows/images.yml'
      - 'Dockerfile'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'src/**'
      - 'tsconfig.json'
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: images-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build runtime image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: runtime
          load: true
          pull: true
          tags: structured-log-service:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify non-root runtime user
        run: |
          user=$(docker run --rm --entrypoint whoami structured-log-service:ci)
          echo "runtime user: ${user}"
          test "${user}" != "root"

      - name: Verify runtime artifacts
        run: |
          docker run --rm --entrypoint sh structured-log-service:ci -c 'test -f /app/dist/index.js'
          docker run --rm --entrypoint sh structured-log-service:ci -c 'test -d /app/node_modules'

      - name: Verify container entrypoint tools
        run: |
          docker run --rm --entrypoint node structured-log-service:ci --version
          docker run --rm --entrypoint dumb-init structured-log-service:ci --version

  push-image:
    needs: build-test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha

      - name: Build and push runtime image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: runtime
          pull: true
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
