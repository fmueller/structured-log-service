name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: true

      - name: Install dependencies
        run: mise run install

      - name: Verify formatting
        run: mise run format:check

      - name: Lint
        run: mise run lint

      - name: Typecheck
        run: mise run typecheck

  build:
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: true

      - name: Install dependencies
        run: mise run install

      - name: Build project
        run: mise run build

  unit-tests:
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: true

      - name: Install dependencies
        run: mise run install

      - name: Run unit tests
        run: mise run test:unit

  integration-tests:
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: true

      - name: Install dependencies
        run: mise run install

      - name: Run integration tests
        run: mise run test:integration

  e2e-tests:
    needs:
      - build
      - unit-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: true

      - name: Install dependencies
        run: mise run install

      - name: Run end-to-end tests
        run: mise run test:e2e

  mutation-tests:
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: true

      - name: Install dependencies
        run: mise run install

      - name: Run mutation tests
        run: mise run test:mutate
