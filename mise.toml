[tools]
node = "24"
pnpm = "11"

[tasks.install]
description = "Install project dependencies"
run = "pnpm install --frozen-lockfile"

[tasks.lint]
description = "Run ESLint"
run = "pnpm lint"

[tasks.format]
description = "Format repository files"
run = "pnpm format"

[tasks."format:check"]
description = "Check formatting"
run = "pnpm format:check"

[tasks.typecheck]
description = "Run TypeScript typecheck"
run = "pnpm typecheck"

[tasks."test:unit"]
description = "Run unit tests"
run = "pnpm test:unit"

[tasks."test:integration"]
description = "Run integration tests"
run = "pnpm test:integration"

[tasks."test:e2e"]
description = "Run end-to-end tests"
run = "pnpm test:e2e"

[tasks.test]
description = "Run full test suite"
run = "pnpm test"

[tasks.build]
description = "Build TypeScript output"
run = "pnpm build"

[tasks.check]
description = "Run lint, format check, and typecheck"
run = "pnpm check"

[tasks."test:mutate"]
description = "Run mutation testing"
run = "pnpm test:mutate"

[tasks."docker:build"]
description = "Build Docker image locally"
run = "docker build -t structured-log-service:local ."

[tasks."compose:up"]
description = "Start app + otelcol (no synthetic load)"
run = "docker compose up --build"

[tasks."compose:smoke"]
description = "Start app + otelcol + synthetic producer (loadtest profile)"
run = "docker compose --profile loadtest up --build"

[tasks."compose:down"]
description = "Stop and remove Compose stack"
run = "docker compose --profile loadtest down --remove-orphans"

[tasks.dev]
description = "Run dev server"
run = "pnpm dev"

[tasks."compose:smoke:once"]
description = "Run synthetic producer once (N batches). Override via BATCH_LIMIT=N env or set default below."
run = "BATCH_LIMIT=${BATCH_LIMIT:-50} docker compose --profile loadtest up --build --abort-on-container-exit --exit-code-from log-producer"

[tasks."compose:smoke:scenario"]
description = "Run synthetic producer locked to a scenario. Override via SCENARIO=name env (default: baseline)."
run = "SCENARIO=${SCENARIO:-baseline} docker compose --profile loadtest up --build"
