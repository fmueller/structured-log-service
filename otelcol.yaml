receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 256
    spike_limit_mib: 64

  # Pivots the per-record log.service attribute into its enclosing resource so each
  # simulated service ends up in its own ResourceLogs batch downstream.
  groupbyattrs/log-service:
    keys:
      - log.service

  # Renames the resource attribute log.service → service.name so Dash0 keys each
  # batch by the simulated upstream service (checkout-api, payment-service, …)
  # instead of the static log-ingestion-service set by the SDK.
  transform/rename-log-service:
    log_statements:
      - context: resource
        statements:
          - set(attributes["service.name"], attributes["log.service"]) where attributes["log.service"] != nil
          - delete_key(attributes, "log.service")

  batch:
    timeout: 2s
    send_batch_size: 512

exporters:
  debug:
    verbosity: basic

  otlp/dash0:
    endpoint: ${env:DASH0_OTLP_ENDPOINT}
    headers:
      Authorization: Bearer ${env:DASH0_AUTH_TOKEN}

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug, otlp/dash0]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, groupbyattrs/log-service, transform/rename-log-service, batch]
      exporters: [debug, otlp/dash0]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug, otlp/dash0]
